name = "two-api"
main = "src/index.ts"
compatibility_date = "2025-04-14"
compatibility_flags = ["nodejs_compat"]

# Durable Objects
[[durable_objects.bindings]]
name = "CHAT_ROOM"
class_name = "ChatRoom"

[[migrations]]
tag = "v1"
new_classes = ["ChatRoom"]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "two-db"
database_id = "c66015be-a0d6-49b1-ae76-f330986dfcfc"
migrations_dir = "migrations"

# R2 Bucket
[[r2_buckets]]
binding = "MEDIA"
bucket_name = "two-media"

# KV Namespace (JWT blocklist)
[[kv_namespaces]]
binding = "SESSIONS"
id = "5b910b1bd9734d1a833f8473bf3e1004"

[vars]
ENVIRONMENT = "development"
# R2 S3-compatible credentials for presigned upload URLs.
# Set real values via: wrangler secret put R2_ACCOUNT_ID / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY
R2_ACCOUNT_ID = ""
R2_ACCESS_KEY_ID = ""
R2_SECRET_ACCESS_KEY = ""

# Uncomment and set via `wrangler secret put JWT_SECRET` for production
# JWT_SECRET = ""
